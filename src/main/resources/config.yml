sync-interval-ticks: 10

# Debug mode - logs every stat push and PAPI resolve to console
debug: true

messages:
  no-permission: '§cYou do not have permission to use this command.'
  reload-success: '§aCampfireHUD config reloaded successfully.'

# PlaceholderAPI bridge
# Plugin resolves each placeholder every sync cycle and stores:
#   - Numeric result → scoreboard score on objective "chud_<key>"
#   - Any result → objective display name (for text display)
# Key <= 10 chars. Use /campfirehud reload after editing.
placeholders:
  balance: '%vault_eco_balance%'
  level:   '%player_level%'
  health:  '%player_health%'
  food:    '%player_foodlevel%'
  armor:   '%player_armor%'
  air:     '%player_air%'
